#
# docker-compose.prod.dokploy.yml
#
# Compose unificado para despliegue en Dokploy (Traefik como reverse proxy).
# Integra todos los servicios de services/postgres.yaml, services/redis.yaml y
# services/powersync.yaml en un solo archivo sin directivas `include:`.
#
# ANTES DE DESPLEGAR, actualiza las variables secretas en config/prod.env:
#   - SECRET_KEY           (genera con: python -c "import secrets; print(secrets.token_urlsafe(50))")
#   - JWT_PUBLIC_KEY / JWT_PRIVATE_KEY  (genera con: docker compose exec web ./manage.py generate-jwt-keys)
#   - POSTGRES_PASSWORD    (cambia el valor por defecto 'wger')
#   - PS_DATABASE_URI / PS_STORAGE_PG_URI  (actualiza con el nuevo password de postgres)
#

services:

  # ---------------------------------------------------------------------------
  # Aplicación principal Django/Gunicorn
  # ---------------------------------------------------------------------------
  web:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 5
    restart: unless-stopped
    networks:
      - wger_network

  # ---------------------------------------------------------------------------
  # Nginx: sirve archivos estáticos/media y hace proxy a Gunicorn y PowerSync.
  # Traefik (Dokploy) enruta el tráfico externo hacia este contenedor en el
  # puerto 80. El SSL y los certificados los gestiona Traefik.
  # ---------------------------------------------------------------------------
  nginx:
    image: docker.io/nginx:stable
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      - web
      - powersync
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/wger/static:ro
      - media:/wger/media:ro
    expose:
      - 80
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wger_network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP → redirige a HTTPS (usa el middleware global definido en middlewares.yml)
      - "traefik.http.routers.rippedandrenew-wger-1-web.rule=Host(`rippedandrenew.com`) || Host(`www.rippedandrenew.com`) || Host(`rippedandrenew.net`) || Host(`www.rippedandrenew.net`) || Host(`rippedandrenew.info`) || Host(`www.rippedandrenew.info`) || Host(`rippedandrenew.org`) || Host(`www.rippedandrenew.org`)"
      - "traefik.http.routers.rippedandrenew-wger-1-web.entrypoints=web"
      - "traefik.http.routers.rippedandrenew-wger-1-web.service=rippedandrenew-wger-1-web"
      - "traefik.http.routers.rippedandrenew-wger-1-web.middlewares=redirect-to-https@file"
      - "traefik.http.services.rippedandrenew-wger-1-web.loadbalancer.server.port=80"
      # HTTPS
      - "traefik.http.routers.rippedandrenew-wger-1-websecure.rule=Host(`rippedandrenew.com`) || Host(`www.rippedandrenew.com`) || Host(`rippedandrenew.net`) || Host(`www.rippedandrenew.net`) || Host(`rippedandrenew.info`) || Host(`www.rippedandrenew.info`) || Host(`rippedandrenew.org`) || Host(`www.rippedandrenew.org`)"
      - "traefik.http.routers.rippedandrenew-wger-1-websecure.entrypoints=websecure"
      - "traefik.http.routers.rippedandrenew-wger-1-websecure.service=rippedandrenew-wger-1-websecure"
      - "traefik.http.routers.rippedandrenew-wger-1-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.rippedandrenew-wger-1-websecure.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: docker.io/postgres:15-alpine
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    env_file:
      - ./config/prod.env
    environment:
      - TZ=America/New_York
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    expose:
      - 5432
    command: [
      "postgres",
      "-c", "wal_level=logical",
      "-c", "shared_buffers=256MB",
      "-c", "effective_cache_size=768MB",
      "-c", "work_mem=8MB",
      "-c", "random_page_cost=1.1",
      "-c", "max_connections=30"
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wger_network

  # ---------------------------------------------------------------------------
  # Redis (caché y broker de Celery)
  # ---------------------------------------------------------------------------
  cache:
    image: docker.io/redis
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    expose:
      - 6379
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wger_network

  # ---------------------------------------------------------------------------
  # PowerSync (sincronización offline para la app móvil)
  # ---------------------------------------------------------------------------
  powersync:
    image: docker.io/journeyapps/powersync-service:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: ["start", "-r", "unified"]
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./services/config-powersync:/config:ro
    env_file:
      - ./config/prod.env
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml
      PS_JWKS_URL: http://web:8000/api/v2/powersync-keys
    expose:
      - 8080
      - 9090
    restart: unless-stopped
    networks:
      - wger_network

  # ---------------------------------------------------------------------------
  # Celery Worker (tareas asíncronas: sync de ejercicios, ingredientes, etc.)
  # ---------------------------------------------------------------------------
  celery_worker:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-worker
    env_file:
      - ./config/prod.env
    volumes:
      - media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - wger_network

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduler de tareas periódicas)
  # ---------------------------------------------------------------------------
  celery_beat:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-beat
    volumes:
      - celery-beat:/home/wger/beat/
    env_file:
      - ./config/prod.env
    depends_on:
      celery_worker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wger_network

# -----------------------------------------------------------------------------
# Volúmenes
# -----------------------------------------------------------------------------
volumes:
  postgres-data:
  celery-beat:
  redis-data:
  media:
  static:

# -----------------------------------------------------------------------------
# Redes
# -----------------------------------------------------------------------------
networks:
  wger_network:
    name: rippedandrenew-wger
    external: true
  dokploy-network:
    name: dokploy-network
    external: true
